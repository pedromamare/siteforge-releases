server {
    listen 80;
    server_name _;

    # Serve update manifests directly from container
    # electron-updater asks for: latest-mac.yml, latest-linux.yml, latest.yml
    location ~ ^/latest.*\.(yml|json)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Redirect binary downloads to GitHub Releases
    # (SiteForge-*.zip, SiteForge-*.dmg, etc.)
    location / {
        return 302 https://github.com/pedromamare/siteforge-releases/releases/latest/download$request_uri;
    }
}
