server {
    listen 80;
    server_name _;

    # Redirect all requests to GitHub Releases latest download
    # electron-updater asks for: latest-mac.yml, latest-linux.yml, latest.yml
    # and the actual update binaries (SiteForge-*.zip, etc.)
    location / {
        return 302 https://github.com/pedromamare/siteforge-releases/releases/latest/download$request_uri;
    }

    # Legacy: Tauri updater compatibility (latest.json)
    location = /latest.json {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
